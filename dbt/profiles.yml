# sample profiles.yml for local development
# For Docker Compose: host should be 'postgres' (service name in compose file)
# For local dev: host should be 'localhost'

dakota_profile:
  target: dev
  outputs:
    dev:
      type: postgres
      host: localhost  # Change to 'localhost' for local development outside Docker
      user: energy_user
      password: energy_password
      port: 5432
      dbname: energy_analytics
      schema: dbt
      threads: 4
      keepalives_idle: 0
