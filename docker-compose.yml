# Dakota Analytics Data Pipeline
# Services for end-to-end data processing

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dakota_postgres
    environment:
      POSTGRES_USER: energy_user
      POSTGRES_PASSWORD: energy_password
      POSTGRES_DB: energy_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # persistent database storage
      - ./database/init:/docker-entrypoint-initdb.d  # Runs 01_schema.sql on first startup
    networks:
      - dakota_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy_user -d energy_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Enrichment Service
  api:
    build: ./api
    container_name: dakota_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://energy_user:energy_password@postgres:5432/energy_analytics
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dakota_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Add your other services here:
  # - Ingestion service
  # - Orchestrator (e.g., Prefect, Airflow)
  # - dbt runner
  # - Jupyter for reports
  # etc.

networks:
  dakota_network:
    driver: bridge

volumes:
  postgres_data:
