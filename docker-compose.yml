# Dakota Analytics Data Pipeline
# Services for end-to-end data processing

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dakota_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-energy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-energy_password}
      POSTGRES_DB: ${POSTGRES_DB:-energy_analytics}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # persistent database storage
      - ./database/init:/docker-entrypoint-initdb.d  # Runs 01_schema.sql on first startup
    networks:
      - dakota_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-energy_user} -d ${POSTGRES_DB:-energy_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Enrichment Service
  api:
    build: ./api
    container_name: dakota_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://energy_user:energy_password@postgres:5432/energy_analytics}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dakota_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Data Ingestion Service
  ingestion:
    build: ./ingestion
    container_name: dakota_ingestion
    environment:
      - EIA_API_KEY=${EIA_API_KEY}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-energy_analytics}
      - DB_USER=${DB_USER:-energy_user}
      - DB_PASSWORD=${DB_PASSWORD:-energy_password}
      - API_BASE_URL=${API_BASE_URL:-http://api:8000}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - dakota_network
    restart: "no"  # Run once and exit

  # Prefect Orchestration Service
  orchestration:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    container_name: dakota_orchestration
    working_dir: /workspace/orchestration
    command: ["python", "flows.py"]
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-energy_analytics}
      - DB_USER=${DB_USER:-energy_user}
      - DB_PASSWORD=${DB_PASSWORD:-energy_password}
      - API_BASE_URL=${API_BASE_URL:-http://api:8000}
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; c=open('/proc/1/cmdline','rb').read().decode('utf-8','ignore'); sys.exit(0 if 'flows.py' in c else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - dakota_network
    restart: unless-stopped

networks:
  dakota_network:
    driver: bridge

volumes:
  postgres_data:
